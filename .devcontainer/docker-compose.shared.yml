services:
  php:
    volumes:
      - ../:/workspace:cached
    working_dir: /workspace

  nginx:
    environment:
      - MAGE_ROOT_DIR=/workspace
    volumes:
      - ../:/workspace:cached
      - ./magento2-devcontainer/nginx/default:/etc/nginx/templates
      - ./magento2-devcontainer/nginx/fastcgi_params:/etc/nginx/fastcgi_params:ro